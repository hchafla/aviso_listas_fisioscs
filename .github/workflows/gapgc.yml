name: Vigilante GAPGC

on:
  schedule:
    - cron: '15 9,12,15 * * 1-5'
  workflow_dispatch:

jobs:
  check-gapgc:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Inicializar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: pip install requests pdfplumber

    - name: Ejecutar Extractor GAPGC
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python vigilante_gapgc.py

    - name: Sincronizar Historial
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add ultimo_gapgc.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Sync GAPGC State [skip ci]" && git push)
