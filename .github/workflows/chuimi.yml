name: Vigilante CHUIMI

on:
  schedule:
    # Se ejecuta de lunes a viernes a las 09:00, 12:00 y 15:00 en Canarias (WET)
    - cron: '0 9,12,15 * * 1-5'
  workflow_dispatch:

jobs:
  check-chuimi:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v3

    - name: Inicializar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: pip install requests pdfplumber

    - name: Ejecutar Extractor CHUIMI
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python vigilante_chuimi.py

    - name: Sincronizar Historial
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add ultimo_chuimi.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Sync CHUIMI State [skip ci]" && git push)
