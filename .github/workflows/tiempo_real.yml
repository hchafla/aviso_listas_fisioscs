name: Monitor SCS
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions: contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - run: pip install requests beautifulsoup4 pdfplumber google-api-python-client google-auth
      - run: python tiempo_real.py
      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.txt *.csv
          git commit -m "🔄 Actualización" || echo "Sin cambios"
          git push origin main
