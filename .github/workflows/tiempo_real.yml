name: Monitor SCS Fisio
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - run: pip install requests beautifulsoup4 pdfplumber
      - run: python tiempo_real.py
      
      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Git status ayuda a ver si el archivo cambió realmente
          git status
          git add estado_*.txt mapeo_fisio_*.csv
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Update data [Skip CI]"
            git push origin main
          else
            echo "Sin cambios"
          fi
