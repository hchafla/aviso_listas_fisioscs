name: Monitor SCS Tiempo Real

on:
  workflow_dispatch:

jobs:
  audit-direct:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías básicas
      run: pip install requests beautifulsoup4

    - name: Ejecutar auditoría directa por POST
      run: python tiempo_real.py

    - name: Subir código de la segunda pantalla
      uses: actions/upload-artifact@v4
      with:
        name: html-categoria
        path: pantalla_2.txt
