name: Monitor SCS

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ejecutar-monitor]

jobs:
  check-scs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 google-auth google-api-python-client

      - name: Ejecutar script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_FISIO }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TZ: Atlantic/Canary
        run: python tiempo_real.py

      - name: Subir HTML de depuración
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_*.html
          if-no-files-found: ignore

      - name: Guardar estado
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add estado_*.txt || true
          git commit -m "Actualizar estados de gerencias [skip ci]" -a || true
          git push || true
