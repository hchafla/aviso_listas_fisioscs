name: Monitor SCS Tiempo Real

on:
  schedule:
    - cron: '0,15,30,45 7-16 * * 1-5'
  workflow_dispatch:

jobs:
  check-scs:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías y Playwright
      run: |
        pip install playwright beautifulsoup4 requests
        playwright install chromium

    - name: Ejecutar consulta automatizada
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python tiempo_real.py

    - name: Guardar estado si ha cambiado
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ultimo_estado_llamamientos.txt || true
        git commit -m "Actualizar estado de control de llamamientos [skip ci]" -a || true
        git push || true
