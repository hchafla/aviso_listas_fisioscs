name: Monitor SCS Fisio
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      
      # He añadido google-api-python-client y google-auth que faltaban
      - run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber google-api-python-client google-auth
          
      - name: Ejecutar Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_FISIO: ${{ secrets.TELEGRAM_CHAT_ID_FISIO }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python tiempo_real.py
      
      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado_*.txt mapeo_fisio_*.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Update data [Skip CI]"
            git push origin main
          fi
