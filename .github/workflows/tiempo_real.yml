name: Monitor SCS Tiempo Real

on:
  workflow_dispatch:

jobs:
  audit-scs:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Playwright
      run: |
        pip install playwright
        playwright install chromium

    - name: Ejecutar captura de auditoría
      run: python tiempo_real.py

    - name: Subir resultados de la auditoría
      uses: actions/upload-artifact@v4
      with:
        name: evidencias-scs
        path: |
          evidencia_visual.png
          codigo_fuente.txt
