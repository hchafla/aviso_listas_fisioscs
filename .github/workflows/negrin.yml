name: Vigilante NEGRIN

on:
  schedule:
    # Se ejecuta de lunes a viernes a las 09:30, 12:30 y 15:30 en Canarias (WET)
    # Desfasado otros 15 minutos para organizar las ejecuciones en cola
    - cron: '30 9,12,15 * * 1-5'
  workflow_dispatch:

jobs:
  check-negrin:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Inicializar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: pip install requests pdfplumber

    - name: Ejecutar Extractor NEGRIN
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python vigilante_negrin.py

    - name: Sincronizar Historial
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add ultimo_negrin.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Sync NEGRIN State [skip ci]" && git push)
